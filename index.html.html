<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지도학생 상담 예약</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- ✅ Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCitDuRmfSSfaxx03Kvy8_lcemZFoyzxBE",
    authDomain: "consultation-booking-cf708.firebaseapp.com",
    databaseURL: "https://consultation-booking-cf708-default-rtdb.firebaseio.com",
    projectId: "consultation-booking-cf708",
    storageBucket: "consultation-booking-cf708.firebasestorage.app",
    messagingSenderId: "617741115823",
    appId: "1:617741115823:web:46d473fafe416694b9cf5a",
    measurementId: "G-0VSNWVZQ9Q"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ── 교수님이 설정한 상담 가능 슬롯 (여기서 수정하세요) ──
  window.SLOTS = [
    { id: "s1",  date: "2025-05-12", time: "10:00", label: "5월 12일 (월) 10:00" },
    { id: "s2",  date: "2025-05-12", time: "11:00", label: "5월 12일 (월) 11:00" },
    { id: "s3",  date: "2025-05-12", time: "14:00", label: "5월 12일 (월) 14:00" },
    { id: "s4",  date: "2025-05-12", time: "15:00", label: "5월 12일 (월) 15:00" },
    { id: "s5",  date: "2025-05-14", time: "10:00", label: "5월 14일 (수) 10:00" },
    { id: "s6",  date: "2025-05-14", time: "11:00", label: "5월 14일 (수) 11:00" },
    { id: "s7",  date: "2025-05-14", time: "14:00", label: "5월 14일 (수) 14:00" },
    { id: "s8",  date: "2025-05-16", time: "13:00", label: "5월 16일 (금) 13:00" },
    { id: "s9",  date: "2025-05-16", time: "14:00", label: "5월 16일 (금) 14:00" },
    { id: "s10", date: "2025-05-16", time: "15:00", label: "5월 16일 (금) 15:00" },
  ];

  window.firebaseDB = db;
  window.firebaseRef = ref;
  window.firebaseSet = set;
  window.firebaseGet = get;
  window.firebaseChild = child;

  // 예약 불러오기
  window.loadBookings = async function() {
    const snapshot = await get(ref(db, 'bookings'));
    return snapshot.exists() ? snapshot.val() : {};
  };

  // 예약 저장
  window.saveBooking = async function(slotId, name, studentId) {
    await set(ref(db, 'bookings/' + slotId), { name, studentId, bookedAt: new Date().toISOString() });
  };

  // 예약 취소
  window.cancelBooking = async function(slotId) {
    await set(ref(db, 'bookings/' + slotId), null);
  };

  window.firebaseReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --surface2: #F3F1EC;
  --border: #E2DFD8;
  --border2: #C8C4BB;
  --text: #1A1916;
  --text-muted: #6B6860;
  --text-hint: #A8A59E;
  --accent: #2D6A4F;
  --accent-light: #D8EDE4;
  --accent-text: #1B4332;
  --red: #B5341A;
  --red-light: #FAEAE6;
  --yellow: #92660A;
  --yellow-light: #FEF3CD;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}

body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.top-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1.25rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo { font-weight: 700; font-size: 1rem; letter-spacing: -0.02em; }
.logo span { color: var(--accent); }

.admin-toggle {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
}
.admin-toggle:hover { background: var(--surface2); color: var(--text); }

/* TABS */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  padding: 0 2rem;
}

.tab {
  padding: 1rem 1.25rem;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  transition: all 0.15s;
}

.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* MAIN */
.main { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }

/* SECTION TITLES */
.section-title {
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.4rem;
}

.section-sub { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.75rem; line-height: 1.6; }

/* SLOT GRID */
.date-group { margin-bottom: 1.5rem; }

.date-label {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text-hint);
  letter-spacing: 0.05em;
  margin-bottom: 10px;
  padding-left: 2px;
}

.slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.slot-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.1rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.08s;
  position: relative;
  overflow: hidden;
}

.slot-card:hover:not(.booked):not(.my-booking) { border-color: var(--accent); transform: translateY(-1px); }
.slot-card:active:not(.booked) { transform: scale(0.98); }

.slot-card.booked {
  background: var(--surface2);
  cursor: not-allowed;
  opacity: 0.6;
}

.slot-card.my-booking {
  background: var(--accent-light);
  border-color: var(--accent);
  cursor: pointer;
}

.slot-time {
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 500;
  margin-bottom: 4px;
}

.slot-status {
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  gap: 5px;
}

.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-available { background: var(--accent); }
.dot-booked { background: var(--text-hint); }
.dot-mine { background: var(--accent); }

.status-text-available { color: var(--accent-text); }
.status-text-booked { color: var(--text-hint); }
.status-text-mine { color: var(--accent-text); font-weight: 500; }

.my-badge {
  position: absolute;
  top: 8px; right: 8px;
  font-size: 0.65rem;
  font-family: var(--mono);
  background: var(--accent);
  color: white;
  padding: 2px 7px;
  border-radius: 4px;
}

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 1rem;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border-radius: 16px;
  padding: 2rem;
  width: 100%;
  max-width: 400px;
  transform: translateY(16px);
  transition: transform 0.2s;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
.modal-sub { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; }

.form-group { margin-bottom: 1rem; }
.form-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; display: block; }

.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 0.9375rem;
  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus { border-color: var(--accent); }

.modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }

.btn-confirm {
  flex: 1;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 0.9375rem;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.12s;
}

.btn-confirm:hover { opacity: 0.85; }
.btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-cancel-modal {
  padding: 12px 18px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 0.875rem;
  font-family: var(--sans);
  cursor: pointer;
  color: var(--text-muted);
  transition: background 0.12s;
}

.btn-cancel-modal:hover { background: var(--surface2); }

/* ADMIN VIEW */
.admin-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
}

.admin-row {
  display: flex;
  align-items: center;
  padding: 1rem 1.25rem;
  gap: 1rem;
}

.admin-time {
  font-family: var(--mono);
  font-size: 0.875rem;
  font-weight: 500;
  min-width: 80px;
  color: var(--text-muted);
}

.admin-info { flex: 1; }
.admin-name { font-size: 0.9rem; font-weight: 500; }
.admin-id { font-size: 0.78rem; color: var(--text-muted); font-family: var(--mono); }

.admin-empty { color: var(--text-hint); font-size: 0.8rem; font-style: italic; }

.admin-cancel-btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.75rem;
  cursor: pointer;
  background: transparent;
  color: var(--red);
  border-color: var(--red-light);
  transition: background 0.12s;
}

.admin-cancel-btn:hover { background: var(--red-light); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: var(--bg);
  padding: 12px 24px;
  border-radius: 999px;
  font-size: 0.875rem;
  font-weight: 500;
  z-index: 300;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* NOTICE */
.notice {
  background: var(--yellow-light);
  border: 1px solid #F0D070;
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 0.8rem;
  color: var(--yellow);
  margin-bottom: 1.5rem;
  line-height: 1.6;
}

/* Loading */
.loading { text-align: center; padding: 3rem; color: var(--text-hint); font-size: 0.875rem; }

@media (max-width: 480px) {
  .slot-grid { grid-template-columns: 1fr; }
  .top-header { padding: 1rem; }
  .tabs { padding: 0 1rem; }
}
</style>
</head>
<body>

<header class="top-header">
  <div class="logo">지도학생 <span>상담 예약</span></div>
  <button class="admin-toggle" onclick="toggleAdmin()">🔒 교수님 보기</button>
</header>

<div class="tabs">
  <div class="tab active" id="tab-student" onclick="switchTab('student')">예약하기</div>
  <div class="tab" id="tab-admin" onclick="switchTab('admin')" style="display:none">예약 현황</div>
</div>

<div class="main">
  <!-- STUDENT VIEW -->
  <div id="view-student">
    <div class="section-title">상담 일정 예약</div>
    <p class="section-sub">원하는 시간대를 선택하고 이름과 학번을 입력해주세요.<br>1인 1슬롯만 예약 가능합니다.</p>
    <div class="notice">⚠️ 예약 후 변경이 필요하면 교수님께 직접 연락하거나, 예약 취소 후 다시 예약해주세요.</div>
    <div id="slot-list"><div class="loading">일정을 불러오는 중...</div></div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="view-admin" style="display:none">
    <div class="section-title">전체 예약 현황</div>
    <p class="section-sub">학생 예약 현황을 확인하고 관리할 수 있습니다.</p>
    <div id="admin-list"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">상담 예약</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="form-group">
      <label class="form-label">이름</label>
      <input class="form-input" id="input-name" type="text" placeholder="홍길동" maxlength="10">
    </div>
    <div class="form-group">
      <label class="form-label">학번</label>
      <input class="form-input" id="input-id" type="text" placeholder="20240001" maxlength="10">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">취소</button>
      <button class="btn-confirm" id="btn-confirm" onclick="confirmBooking()">예약 확정</button>
    </div>
  </div>
</div>

<!-- CANCEL MODAL -->
<div class="modal-overlay" id="modal-cancel">
  <div class="modal">
    <div class="modal-title">예약 취소</div>
    <div class="modal-sub" id="cancel-sub">예약을 취소하시겠습니까?</div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeCancelModal()">돌아가기</button>
      <button class="btn-confirm" style="background:var(--red)" onclick="confirmCancel()">취소 확정</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let bookings = {};
let selectedSlot = null;
let mySlotId = localStorage.getItem('mySlotId') || null;
let isAdmin = false;
let firebaseReady = false;

document.addEventListener('firebase-ready', async () => {
  firebaseReady = true;
  bookings = await window.loadBookings();
  renderSlots();
  renderAdmin();
});

// 날짜별 그룹핑
function groupByDate(slots) {
  const groups = {};
  slots.forEach(s => {
    if (!groups[s.date]) groups[s.date] = [];
    groups[s.date].push(s);
  });
  return groups;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function renderSlots() {
  const container = document.getElementById('slot-list');
  const slots = window.SLOTS || [];
  const groups = groupByDate(slots);
  let html = '';

  Object.entries(groups).forEach(([date, daySlots]) => {
    html += `<div class="date-group">
      <div class="date-label">${formatDate(date)}</div>
      <div class="slot-grid">`;

    daySlots.forEach(slot => {
      const booking = bookings[slot.id];
      const isBooked = !!booking;
      const isMine = mySlotId === slot.id;

      let cardClass = 'slot-card';
      let statusHtml = '';
      let badge = '';
      let onclick = '';

      if (isMine) {
        cardClass += ' my-booking';
        statusHtml = `<span class="dot dot-mine"></span><span class="status-text-mine">${booking.name} (${booking.studentId})</span>`;
        badge = `<span class="my-badge">내 예약</span>`;
        onclick = `onclick="openCancelModal('${slot.id}')"`;
      } else if (isBooked) {
        cardClass += ' booked';
        statusHtml = `<span class="dot dot-booked"></span><span class="status-text-booked">예약 완료</span>`;
      } else {
        statusHtml = `<span class="dot dot-available"></span><span class="status-text-available">예약 가능</span>`;
        onclick = `onclick="openModal('${slot.id}')"`;
      }

      html += `
        <div class="${cardClass}" ${onclick}>
          ${badge}
          <div class="slot-time">${slot.time}</div>
          <div class="slot-status">${statusHtml}</div>
        </div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function renderAdmin() {
  const container = document.getElementById('admin-list');
  const slots = window.SLOTS || [];
  const groups = groupByDate(slots);
  let html = '';

  Object.entries(groups).forEach(([date, daySlots]) => {
    html += `<div class="date-label" style="margin-bottom:8px;margin-top:1rem">${formatDate(date)}</div>`;
    daySlots.forEach(slot => {
      const booking = bookings[slot.id];
      html += `<div class="admin-card"><div class="admin-row">
        <div class="admin-time">${slot.time}</div>
        <div class="admin-info">`;
      if (booking) {
        html += `<div class="admin-name">${booking.name}</div>
          <div class="admin-id">${booking.studentId}</div>`;
      } else {
        html += `<div class="admin-empty">— 미예약</div>`;
      }
      html += `</div>`;
      if (booking) {
        html += `<button class="admin-cancel-btn" onclick="adminCancel('${slot.id}')">취소</button>`;
      }
      html += `</div></div>`;
    });
  });

  container.innerHTML = html;
}

// MODAL
function openModal(slotId) {
  if (mySlotId && mySlotId !== slotId) {
    showToast('이미 다른 시간대에 예약하셨습니다.');
    return;
  }
  const slot = window.SLOTS.find(s => s.id === slotId);
  selectedSlot = slotId;
  document.getElementById('modal-title').textContent = '상담 예약';
  document.getElementById('modal-sub').textContent = slot.label;
  document.getElementById('input-name').value = '';
  document.getElementById('input-id').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('input-name').focus(), 200);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  selectedSlot = null;
}

async function confirmBooking() {
  const name = document.getElementById('input-name').value.trim();
  const sid = document.getElementById('input-id').value.trim();
  if (!name || !sid) { showToast('이름과 학번을 모두 입력해주세요.'); return; }
  if (sid.length < 6) { showToast('학번을 정확히 입력해주세요.'); return; }

  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('btn-confirm').textContent = '저장 중...';

  try {
    await window.saveBooking(selectedSlot, name, sid);
    bookings[selectedSlot] = { name, studentId: sid, bookedAt: new Date().toISOString() };
    mySlotId = selectedSlot;
    localStorage.setItem('mySlotId', mySlotId);
    closeModal();
    renderSlots();
    renderAdmin();
    showToast('✓ 예약이 완료됐습니다!');
  } catch(e) {
    showToast('오류가 발생했습니다. 다시 시도해주세요.');
  }

  document.getElementById('btn-confirm').disabled = false;
  document.getElementById('btn-confirm').textContent = '예약 확정';
}

// CANCEL
function openCancelModal(slotId) {
  const slot = window.SLOTS.find(s => s.id === slotId);
  selectedSlot = slotId;
  document.getElementById('cancel-sub').textContent = `${slot.label} 예약을 취소하시겠습니까?`;
  document.getElementById('modal-cancel').classList.add('open');
}

function closeCancelModal() {
  document.getElementById('modal-cancel').classList.remove('open');
  selectedSlot = null;
}

async function confirmCancel() {
  try {
    await window.cancelBooking(selectedSlot);
    delete bookings[selectedSlot];
    if (mySlotId === selectedSlot) {
      mySlotId = null;
      localStorage.removeItem('mySlotId');
    }
    closeCancelModal();
    renderSlots();
    renderAdmin();
    showToast('예약이 취소됐습니다.');
  } catch(e) {
    showToast('오류가 발생했습니다.');
  }
}

async function adminCancel(slotId) {
  if (!confirm('이 예약을 취소하시겠습니까?')) return;
  try {
    await window.cancelBooking(slotId);
    delete bookings[slotId];
    if (mySlotId === slotId) { mySlotId = null; localStorage.removeItem('mySlotId'); }
    renderSlots();
    renderAdmin();
    showToast('예약이 취소됐습니다.');
  } catch(e) { showToast('오류가 발생했습니다.'); }
}

// ADMIN TOGGLE
function toggleAdmin() {
  const pw = prompt('비밀번호를 입력하세요');
  if (pw === '1234') { // ← 비밀번호 여기서 변경하세요
    isAdmin = true;
    document.getElementById('tab-admin').style.display = 'block';
    switchTab('admin');
    document.querySelector('.admin-toggle').textContent = '✓ 교수님 모드';
  } else if (pw !== null) {
    showToast('비밀번호가 올바르지 않습니다.');
  }
}

function switchTab(tab) {
  document.getElementById('tab-student').classList.toggle('active', tab === 'student');
  document.getElementById('tab-admin').classList.toggle('active', tab === 'admin');
  document.getElementById('view-student').style.display = tab === 'student' ? 'block' : 'none';
  document.getElementById('view-admin').style.display = tab === 'admin' ? 'block' : 'none';
}

// TOAST
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
document.getElementById('modal-cancel').addEventListener('click', e => { if (e.target === document.getElementById('modal-cancel')) closeCancelModal(); });

// Enter key
document.getElementById('input-id').addEventListener('keydown', e => { if (e.key === 'Enter') confirmBooking(); });
</script>
</body>
</html>
